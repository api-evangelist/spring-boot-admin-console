focusColumns:
  ServiceName: Spring Boot Admin
  ServiceCategory: Developer Tools
  ProviderName: Spring Boot Admin
  PublisherName: codecentric AG
  InvoiceIssuerName: codecentric AG
  BillingCurrency: EUR
meters:
  - name: support_engagement
    unit: month
    aggregation: sum
    dimensions:
      - contract_tier
principles:
  - name: Visibility
    description: Costs surface in the operator's cloud bill (the compute/memory hosting the Admin Server) and in any codecentric support invoice. The software itself emits no usage telemetry beyond Spring Boot Actuator metrics.
  - name: Allocation
    description: Allocate Admin Server hosting cost to the platform/SRE team that owns it. Tag the underlying compute with team and environment via the cloud provider's tagging.
  - name: Optimization
    description: Right-size the Admin Server JVM and consolidate multiple environments into a single Admin Server where security boundaries allow. The software is free; the only cost lever is infrastructure footprint.
  - name: Accountability
    description: Platform/SRE team owns the Admin Server budget. There is no per-call chargeback because there is no vendor meter.
maintainers:
