naftiko: "1.0.0-alpha1"

info:
  label: "Spring Boot Admin Server API"
  description: >-
    Spring Boot Admin server REST API for managing registered Spring Boot
    applications. Provides application registration, instance monitoring,
    Actuator endpoint proxying, and lifecycle event streaming via SSE.
  tags:
    - Spring Boot Admin
    - Administration
    - Monitoring
    - Microservices
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SPRING_BOOT_ADMIN_URL: SPRING_BOOT_ADMIN_URL

capability:
  consumes:
    - type: http
      namespace: spring-boot-admin
      baseUri: "{{env.SPRING_BOOT_ADMIN_URL}}"
      description: "Spring Boot Admin server REST API"
      resources:
        - name: applications
          path: /applications
          description: "Application registration and management"
          operations:
            - name: list-applications
              method: GET
              description: "List all registered applications with their instances"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: register-application
              method: POST
              description: "Register a new Spring Boot application"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  managementUrl: "{{tools.managementUrl}}"
                  healthUrl: "{{tools.healthUrl}}"
                  serviceUrl: "{{tools.serviceUrl}}"

            - name: get-application
              method: GET
              description: "Get all instances for a specific application"
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Application name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: deregister-application
              method: DELETE
              description: "Deregister all instances of an application"
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Application name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: instances
          path: /instances
          description: "Application instance monitoring and management"
          operations:
            - name: list-instances
              method: GET
              description: "List all registered instances"
              inputParameters:
                - name: application
                  in: query
                  type: string
                  required: false
                  description: "Filter by application name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-instance
              method: GET
              description: "Get details for a specific instance"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Instance ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: deregister-instance
              method: DELETE
              description: "Deregister a specific instance"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Instance ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-instance-actuator-endpoints
              method: GET
              description: "Get available Actuator endpoints for an instance"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Instance ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-instance-health
              method: GET
              description: "Get health status of a specific instance"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Instance ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-instance-info
              method: GET
              description: "Get application info for a specific instance"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Instance ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-instance-metrics
              method: GET
              description: "Get available metrics for a specific instance"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Instance ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-instance-environment
              method: GET
              description: "Get environment properties for a specific instance"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Instance ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-instance-loggers
              method: GET
              description: "Get logger configuration for a specific instance"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Instance ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: set-instance-logger-level
              method: POST
              description: "Set logger level for a specific instance at runtime"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Instance ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  configuredLevel: "{{tools.level}}"

  exposes:
    - type: rest
      port: 8100
      namespace: spring-boot-admin-rest
      resources:
        - path: /v1/applications
          name: applications
          operations:
            - method: GET
              name: list-applications
              description: "List all registered applications"
              call: "spring-boot-admin.list-applications"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/instances
          name: instances
          operations:
            - method: GET
              name: list-instances
              description: "List all registered instances"
              call: "spring-boot-admin.list-instances"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/instances/{id}/health
          name: instance-health
          operations:
            - method: GET
              name: get-instance-health
              description: "Get instance health"
              call: "spring-boot-admin.get-instance-health"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: spring-boot-admin-mcp
      transport: http
      tools:
        - name: list-applications
          description: "List all Spring Boot applications registered with the Admin server"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-boot-admin.list-applications"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-application
          description: "Get all instances for a specific application by name"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-boot-admin.get-application"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-instances
          description: "List all registered application instances, optionally filtered by application name"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-boot-admin.list-instances"
          with:
            application: "tools.application"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-instance
          description: "Get full details for a specific application instance by ID"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-boot-admin.get-instance"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-instance-health
          description: "Get the current health status of a registered instance by ID"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-boot-admin.get-instance-health"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-instance-info
          description: "Get application info (build version, git commit) for an instance"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-boot-admin.get-instance-info"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-instance-metrics
          description: "Get available Micrometer metrics for a specific instance"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-boot-admin.get-instance-metrics"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-instance-environment
          description: "Get environment properties and configuration for a specific instance"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-boot-admin.get-instance-environment"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-instance-loggers
          description: "Get logger configuration for a specific instance"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-boot-admin.get-instance-loggers"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: set-instance-logger-level
          description: "Change the log level for a logger on a specific instance at runtime"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "spring-boot-admin.set-instance-logger-level"
          with:
            id: "tools.id"
            level: "tools.level"
          outputParameters:
            - type: object
              mapping: "$."

        - name: deregister-instance
          description: "Deregister and remove a specific instance from the Admin server"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "spring-boot-admin.deregister-instance"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
