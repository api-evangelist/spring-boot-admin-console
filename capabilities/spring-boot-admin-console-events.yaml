naftiko: 1.0.0-alpha2
info:
  label: Spring Boot Admin Server API — Events
  description: 'Spring Boot Admin Server API — Events. 1 operations. Lead operation: Stream Instance Events. Self-contained
    Naftiko capability covering one Spring Boot Admin Console business surface.'
  tags:
  - Spring Boot Admin Console
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPRING_BOOT_ADMIN_CONSOLE_API_KEY: SPRING_BOOT_ADMIN_CONSOLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: spring-boot-admin-console-events
    baseUri: http://localhost:8080
    description: Spring Boot Admin Server API — Events business capability. Self-contained, no shared references.
    resources:
    - name: instances-events
      path: /instances/events
      operations:
      - name: streaminstanceevents
        method: GET
        description: Stream Instance Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: spring-boot-admin-console-events-rest
    port: 8080
    description: REST adapter for Spring Boot Admin Server API — Events. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/instances/events
      name: instances-events
      description: REST surface for instances-events.
      operations:
      - method: GET
        name: streaminstanceevents
        description: Stream Instance Events
        call: spring-boot-admin-console-events.streaminstanceevents
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: spring-boot-admin-console-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Spring Boot Admin Server API — Events. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: stream-instance-events
      description: Stream Instance Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spring-boot-admin-console-events.streaminstanceevents
      outputParameters:
      - type: object
        mapping: $.
