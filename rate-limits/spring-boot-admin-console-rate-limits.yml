specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Spring Boot Admin Console
providerId: spring-boot-admin-console
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Actuator
  - Administration
  - Java
  - Microservices
  - Monitoring
  - Spring Boot
  - Rate Limiting
description: Spring Boot Admin is self-hosted open-source software. The project does not ship a built-in rate limiter; throttling, quotas, and retry behavior are entirely a function of the operator's deployment (reverse proxy, API gateway, or Spring Cloud Gateway / Resilience4j configuration). No vendor-published numeric limits exist.
sources:
  - https://github.com/codecentric/spring-boot-admin
  - https://codecentric.github.io/spring-boot-admin/current/
notes: No vendor-imposed rate limits. Limits depend entirely on the operator's chosen gateway, ingress, or Resilience4j configuration in front of the Admin Server.
responseCodes:
  throttled: 429
limits:
  - name: Operator-Defined
    scope: deployment
    metric: varies
    limit: see operator deployment configuration
    notes: Spring Boot Admin enforces no built-in throughput limits; whatever the surrounding gateway/proxy enforces is the effective limit.
policies:
  - name: Self-Hosted Throttling
    description: Operators are responsible for configuring rate limits via their reverse proxy, API gateway, or Spring Cloud Gateway / Resilience4j filters. No Retry-After or X-RateLimit-* headers are emitted by the Admin Server itself.
maintainers:
  - name: codecentric AG
    url: https://www.codecentric.de/
    email: info@codecentric.de
